<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Lego Logo</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      align-content: center;
    }

    .logo {
      inline-size: 90vmin;
      block-size: 90vmin;
      margin-inline: auto;

      display: grid;
      grid-template-rows: repeat(50, 1fr);
      grid-template-columns: repeat(50, 1fr);
    }

    :root {
      --back: rebeccapurple;
      --front: white;
    }

    [data-color="back"] {
      background-color: var(--back);
    }

    [data-color="front"] {
      background-color: var(--front);
    }

    .logo div {
      box-shadow: 0 0 1px 1px #0001;
      border-radius: 1px;
      position: relative;
      overflow: hidden;
    }

    .logo div:not([data-color="transparent"])::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #ffffff44 0%, #ffffff1a 35%, #0000001f 100%);
      pointer-events: none;
    }

    .logo div:not([data-color="transparent"])::after {
      content: "";
      position: absolute;
      inline-size: 58%;
      block-size: 58%;
      inset-inline-start: 50%;
      inset-block-start: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 34% 28%, #ffffff9c 0%, #ffffff54 35%, #0000002b 100%);
      box-shadow: inset 0 -1px 1px #00000038, inset 0 1px 1px #ffffff59;
      pointer-events: none;
    }
  </style>
</head>
