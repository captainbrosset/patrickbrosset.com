<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox direction and starting position</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-size: 1.2vmin;
      padding: 2vmin;
      box-sizing: border-box;
      font-family: system-ui;
      display: grid;
      place-content: center;
    }

    .playground {
      display: grid;
      gap: 2vmin;
      rule: 2px dashed #aaa;
      grid-template-columns: 45vw 45vw;
      grid-template-rows: 25vmin 65vmin;
      place-items: center;
      place-content: center;
    }

    .flex {
      display: flex;
      anchor-name: --flex;
      anchor-scope: all;
      gap: 3px;

      --line-dir: to bottom;
      background: linear-gradient(var(--line-dir), transparent calc(50% - 1px), #aaa calc(50% - 1px) calc(50% + 1px), transparent 0);
      padding: 0 4vmin 0 2vmin;
    }

    .flex[data-dir="row-reverse"] {
      padding: 0 2vmin 0 4vmin;
    }

    .flex[data-dir="column"] {
      padding: 2vmin 0 4vmin 0;
      --line-dir: to right;

    }

    .flex[data-dir="column-reverse"] {
      padding: 4vmin 0 2vmin 0;
      --line-dir: to right;
    }

    .flex::after {
      content: "";
      position: absolute;
      width: 2vmin;
      height: 2vmin;
      border: 2px solid #aaa;
      border-width: 2px 2px 0 0;
      transform: rotate(45deg);
      inset: anchor(--flex center) anchor(--flex end) auto auto;
      transform-origin: top right;
    }

    .flex[data-dir="row-reverse"]::after {
      border-width: 0 0 2px 2px;
      inset: anchor(--flex center) auto auto anchor(--flex start);
      translate: .7vmin;
    }

    .flex[data-dir="column"]::after {
      border-width: 0 2px 2px 0;
      inset: auto auto anchor(--flex end) calc(anchor(--flex center) - 1vmin - 1px);
      transform: rotate(45deg);
      transform-origin: center;
    }

    .flex[data-dir="column-reverse"]::after {
      border-width: 2px 0 0 2px;
      inset: anchor(--flex start) auto auto calc(anchor(--flex center) - 1vmin - 1px);
      transform: rotate(45deg);
      transform-origin: center;
    }

    .flex::before {
      position: absolute;
      content: attr(data-dir) " ➡️";
      font-size: 1.7vmin;
      inset:
        auto anchor(--flex end) calc(anchor(--flex start) + 1vmin) anchor(--flex start);
    }

    .flex[data-dir="row-reverse"]::before {
      content: "⬅️ " attr(data-dir);
      text-align: end;
    }

    .flex[data-dir="column"]::before {
      content: attr(data-dir) " ➡️";
      writing-mode: sideways-rl;
      inset:
        anchor(--flex start) calc(anchor(--flex start) + 1vmin) anchor(--flex end) auto;
    }

    .flex[data-dir="column-reverse"]::before {
      content: attr(data-dir) " ➡️";
      writing-mode: sideways-lr;
      inset:
        anchor(--flex start) calc(anchor(--flex start) + 1vmin) anchor(--flex end) auto;
    }

    .flex[data-dir="row-reverse"] {
      flex-direction: row-reverse;
    }

    .flex[data-dir="column"] {
      flex-direction: column;
    }

    .flex[data-dir="column-reverse"] {
      flex-direction: column-reverse;
    }

    .flex>div {
      background-color: hsl(from rgb(189 221 113) calc(360 * sibling-index() / 5) s l);
      padding: 2vmin;
      display: grid;
      place-content: center start;
      border-radius: 1vmin;
    }
  </style>
</head>

<body>
  <div class="playground">
    <div class="flex" data-dir="row">
      <div>Item 1</div>
      <div>Another item</div>
      <div>Again?</div>
      <div>Yes, me too!</div>
      <div>Don't forget about me.</div>
    </div>
    <div class="flex" data-dir="row-reverse">
      <div>Item 1</div>
      <div>Another item</div>
      <div>Again?</div>
      <div>Yes, me too!</div>
      <div>Don't forget about me.</div>
    </div>
    <div class="flex" data-dir="column">
      <div>Item 1</div>
      <div>Another item</div>
      <div>Again?</div>
      <div>Yes, me too!</div>
      <div>Don't forget about me.</div>
    </div>
    <div class="flex" data-dir="column-reverse">
      <div>Item 1</div>
      <div>Another item</div>
      <div>Again?</div>
      <div>Yes, me too!</div>
      <div>Don't forget about me.</div>
    </div>
  </div>
</body>

</html>
