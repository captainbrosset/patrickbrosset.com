title: Fun with grid-lanes - CSSDay 2026 - Hello fresh
notes: |
  And here is one last fun example, mixing 
  2 masonry layouts, one going down, the other one going up.
---

<style>
  html,
  body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    display: grid;
    grid-template-rows: min-content 0 min-content;
    align-content: center;
    background: linear-gradient(180deg, #0b1a3a 0%, #0d3b66 30%, #1a6fa0 55%, #47b8d4 75%, #7ee8fa 100%);
  }

  .up,
  .down {
    display: grid-lanes;
    grid-template-columns: repeat(10, auto);
  }

  .down {
    grid-lanes-direction: column fill-reverse;
    z-index: 2;
  }

  .bubble {
    inline-size: 10vw;

    aspect-ratio: 1;
    justify-self: center;

    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 25%, #fff8 0%, #fff0 40%),
      radial-gradient(circle at 65% 70%, #fff3 0%, #fff0 30%),
      radial-gradient(circle at 50% 50%, #89cfef55 0%, #4a90d955 50%, #2a60a944 100%);
    box-shadow:
      inset 0 0 .5vw .2vw #fff4,
      inset 0 -.5vw 1vw #0003,
      0 0 .3vw .1vw #fff2;
    box-sizing: border-box;
    border: 1px solid #fff5;

    animation: float 5s ease-in-out infinite;
    animation-delay: calc(-0.5s * sibling-index());
  }

  @keyframes float {

    0%,
    100% {
      transform: translateY(0);
    }

    50% {
      transform: translateY(-10px);
    }
  }

  .bubble:nth-child(3n) {
    inline-size: 6vw;
  }

  .bubble:nth-child(5n) {
    inline-size: 8vw;
  }

  .bubble:nth-child(7n) {
    inline-size: 4vw;
  }

  h1 {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40vw;
    letter-spacing: -3vw;
    line-height: 0;
    font-family: system-ui, sans-serif;
    color: white;
    z-index: 1;
    text-shadow: 0 -1vw 4vw #0004;
  }
</style>
