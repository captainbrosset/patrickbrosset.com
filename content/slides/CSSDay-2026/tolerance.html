<main>
  <h1>Flow tolerance</h1>
  <ul>
    <li>Two conflicting goals: visual balance vs. preserve DOM order</li>
    <li>Tolerance 0: always place in shortest lane</li>
    <li>Default: <code>1em</code></li>
    <li>Higher tolerance → more predictable lane order</li>
    <li><code>infinite</code> → always fill lanes sequentially</li>
  </ul>
</main>
