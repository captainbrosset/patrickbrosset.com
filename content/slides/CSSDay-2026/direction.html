<main>
  <h1>Direction</h1>
  <p>Similar to flexbox: row / row-reverse, column / column-reverse</p>
  <ul>
    <li><code>grid-lanes-direction: column track-reverse</code> → fill from the right-most lane</li>
    <li><code>grid-lanes-direction: column fill-reverse</code> → fill from the bottom up</li>
  </ul>
</main>
