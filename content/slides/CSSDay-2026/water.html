<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html,
    body {
      block-size: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: grid;
      place-content: center;
      background: black;
    }

    .glass {
      inline-size: 90vmin;
      aspect-ratio: 1;
      display: grid;
      grid-template-rows: 1fr .9fr .1fr;

      .cup {
        place-self: center;
        border-radius: 0 0 50% 50%;
        overflow: hidden;
        background:
          linear-gradient(120deg, rgba(255,255,255,0.4) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.15) 100%),
          rgba(200, 220, 240, 0.25);
        block-size: 100%;
        aspect-ratio: 1;
        border: 1px solid rgba(255,255,255,0.4);
        box-shadow:
          inset 0 0 30px rgba(255,255,255,0.2),
          0 4px 20px rgba(0,0,0,0.1);

        display: grid-lanes;
        grid-template-columns: repeat(auto-fill, auto);
        grid-lanes-direction: column fill-reverse;

        .water {
          background: rgb(125, 210, 236);
          border-radius: 50%;
          block-size: 10px;
          inline-size: 10px;

          &:nth-child(2n) {
            background: rgb(148, 220, 241);
            block-size: 13px;
          }

          &:nth-child(3n) {
            background: rgb(121, 213, 241);
            block-size: 15px;
          }
        }
      }

      .leg {
        place-self: center;
        block-size: 100%;
        aspect-ratio: 1 / 10;
        background:
          linear-gradient(90deg, rgba(255,255,255,0.5) 0%, transparent 30%, transparent 70%, rgba(255,255,255,0.2) 100%),
          rgba(200, 220, 240, 0.3);
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
      }

      .foot {
        place-self: center;
        block-size: 100%;
        aspect-ratio: 8;
        background:
          linear-gradient(120deg, rgba(255,255,255,0.4) 0%, transparent 35%, transparent 65%, rgba(255,255,255,0.15) 100%),
          rgba(200, 220, 240, 0.3);
        corner-shape: scoop;
        border-radius: 44% 44% 0 0;
        border: 1px solid rgba(255,255,255,0.35);
        box-shadow:
          inset 0 0 15px rgba(255,255,255,0.2),
          0 2px 10px rgba(0,0,0,0.08);
      }
    }


    .water {
      background: blue;
      inline-size: 10px;
      aspect-ratio: 1;
    }
  </style>
</head>

<body>
  <div class="glass">
    <div class="cup"></div>
    <div class="leg"></div>
    <div class="foot"></div>
  </div>
  <script>
    const cup = document.querySelector(".cup");
    const NB = 500;
    for (let i = 0; i < NB; i++) {
      const water = document.createElement("div");
      water.className = "water";
      cup.appendChild(water);
    }
  </script>
</body>

</html>
