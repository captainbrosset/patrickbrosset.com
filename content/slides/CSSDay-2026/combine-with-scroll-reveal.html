layout: css-day-slides.njk
title: Building a brick wall on scroll
---

<style>
html, body {
  margin: 0;
}

body {
  background: hsl(12 20% 96%);
}

.wall {
  inline-size: 90vw;
  margin: 5vh auto 20vh;
  display: grid-lanes;
  grid-template-columns: repeat(10, 1fr);
  gap: .5vmin;
}

.brick {
  block-size: 18vmin;
  border-radius: .5vmin;
  background: hsl(0 56% 44%);
}

@supports (animation-timeline: view(block)) {
  .brick {
    animation: reveal-hide linear both;
    animation-timeline: view(block);
    animation-range: entry 0%;
  }
}

@keyframes reveal-hide {
  0% {
    transform: translateY(15vmin);
    opacity: 0;
  }

  100% {
    transform: translateY(0);
    opacity: 1;
  }
}
</style>

<div class="wall"></div>

<script>
  const wall = document.querySelector('.wall');

  const BRICKS = 200;
  const MIN_SIZE = 18;
  const MAX_SIZE = 26;

  for (let i = 0; i < BRICKS; i++) {
    const brick = document.createElement('div');
    brick.classList.add('brick');
    brick.style.blockSize = MIN_SIZE + Math.random() * (MAX_SIZE - MIN_SIZE) + 'vmin';
    wall.appendChild(brick);
  }
</script>
