<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masonry</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: black;

      --cols: 20;
    }

    body {
      display: grid;
      place-items: center;
    }

    .masonry {
      height: 90vmin;
      width: 90vmin;
      overflow: hidden;

      display: grid-lanes;
      grid-template-columns: repeat(var(--cols), 1fr);
      grid-lanes-direction: column fill-reverse;
      gap: calc(90vmin / var(--cols) * .25);

      background: url(https://upload.wikimedia.org/wikipedia/commons/a/ab/Official_CSS_Logo.svg) no-repeat;
      background-position: center bottom;
      background-size: 100%;

      div {
        aspect-ratio: 1;
        background-color: white;
        mix-blend-mode: overlay;

        transform: translateY(-200%) scaleX(0.5);
        animation:
          fall .125s ease-out forwards,
          color 10s calc(sibling-index() * .1s) linear infinite,
          mix 5s ease-out alternate infinite;

        grid-column: span 3;
      }

      div:nth-child(8n) {
        grid-column: span 2;
      }

      div:nth-child(6n) {
        aspect-ratio: 1 / 1.5;
      }

      div:nth-child(7n) {
        height: 1;
      }

      div:nth-child(2n+1) {
        clip-path: shape(from 0 100%, line to 100% 100%, line to 50% 0);
      }

      div:nth-child(7n+1) {
        clip-path: shape(from 0 0, line to 100% 0, line to 50% 100%);
      }

      div:nth-child(5n) {
        clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
      }

      div:nth-child(11n) {
        clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%);
      }

      div:nth-child(13n) {
        /* Star */
        clip-path: shape(from 50% 0, line to 61.8% 35.1%, line to 98.5% 35.1%, line to 69.1% 57.7%, line to 80.9% 91.6%, line to 50% 70.9%, line to 19.1% 91.6%, line to 30.9% 57.7%, line to 1.5% 35.1%, line to 38.2% 35.1%);
      }

      div:nth-child(9n) {
        clip-path: ellipse();
      }
    }

    @keyframes fall {
      to {
        transform: translateY(0) scaleX(1);
      }
    }

    @keyframes color {
      0% {
        background-color: white;
      }

      50% {
        background-color: hsl(calc(sibling-index() * 20), 100%, 70%);
      }

      100% {
        background-color: white;
      }
    }

    @keyframes mix {
      0% {
        mix-blend-mode: overlay;
      }

      50% {
        mix-blend-mode: saturation;
      }

      100% {
        mix-blend-mode: multiply;
      }
    }
  </style>
</head>

<body>
  <div class="masonry"></div>

  <script>
    const NB = 80;
    const DELAY = 100;
    const container = document.querySelector('.masonry');

    async function main() {
      for (let i = 0; i < NB; i++) {
        const div = document.createElement('div');
        container.appendChild(div);
        await new Promise(resolve => setTimeout(resolve, DELAY));
      }
    }

    main();
  </script>
</body>

</html>
