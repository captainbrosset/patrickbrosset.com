<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite loading</title>
  <style>
    html {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-size: 11pt;
      line-height: 1.6;
      font-family: comic sans, cursive, sans-serif;
      padding: 2rem;
      box-sizing: border-box;
      margin: 0;
      height: 100%;
      overflow-y: auto;
    }

    h1 {
      margin: 0 0 2rem 0;
    }

    .infinite {
      display: grid-lanes;
      grid-template-columns: repeat(auto-fill, minmax(20rem, 1fr));
      gap: 1rem;
    }

    .item {
      background: hsl(calc(sibling-index() * 30), 100%, 85%);
      padding: 1rem;
      opacity: 1;
      transition: opacity 0.5s ease;

      @starting-style {
        opacity: 0;
      }

      &.loading {
        grid-column: 1 / -1;
        text-align: center;
        font-style: italic;
        transition: none;
        background: transparent;

        &::before {
          content: "";
          display: inline-block;
          width: 1.2rem;
          height: 1.2rem;
          border: 3px solid currentColor;
          border-inline-end-color: transparent;
          border-radius: 50%;
          vertical-align: middle;
          margin-inline-end: 0.5rem;
          animation: spin 0.8s linear infinite;
        }
      }
    }

    @keyframes spin {
      to {
        transform: rotate(1turn);
      }
    }

    .item p:first-child {
      margin-block-start: 0;
    }

    .item p:last-child {
      margin-block-end: 0;
    }

    footer {
      margin-block-start: 2rem;
      text-align: center;
      display: none;
      font-weight: bold;
    }

    body.reached-bottom footer {
      display: block;
    }
  </style>
</head>

    const BULK_LOAD_SIZE = 8;
    const MIN_LOADING_DELAY = 300;
    const MAX_LOADING_DELAY = 1000;
    const MAX_ITEMS = 100;
    const MAX_SENTENCE_COUNT = 4;
    const container = document.querySelector(".infinite");
    let sentenceOffset = 0;

    function getSentences() {
      const sentenceCount = Math.floor(Math.random() * MAX_SENTENCE_COUNT);
      const sentences = [];

      while (sentences.length <= sentenceCount) {
        if (sentenceOffset > LOREM.length) {
          sentenceOffset = 0;
        }

        sentences.push(LOREM[sentenceOffset]);
        sentenceOffset++;
      }

      return sentences;
    }

    async function createItem(delay = 0) {
      await new Promise(resolve => setTimeout(resolve, delay));

      const item = document.createElement("div");
      item.classList.add("item");

      const sentences = getSentences();
      for (const s of sentences) {
        const p = document.createElement("p");
        p.textContent = s;
        item.appendChild(p);
      }

      return item;
    }

    function getRandomDelay() {
      return Math.ceil(Math.random() * (MAX_LOADING_DELAY - MIN_LOADING_DELAY) + MIN_LOADING_DELAY);
    }

    async function main() {
      // Create some initial items.
      for (let i = 0; i < BULK_LOAD_SIZE; i++) {
        container.appendChild(await createItem());
      }

      let lastItem = container.lastChild;

      const options = {
        root: document.documentElement,
        // rootMargin: ?
        // scrollMargin ?
        threshold: 0.25
      };

      async function handleIntersection(entries, observer) {
        if (entries.some(e => e.isIntersecting)) {
          // We're interesecting the last element, stop observing it.
          observer.disconnect();

          // Show a loading item right away.
          const loadingItem = document.createElement("div");
          loadingItem.classList.add("item");
          loadingItem.classList.add("loading");
          loadingItem.textContent = "Loading...";
          container.appendChild(loadingItem);

          // Create a few new items and observe the last one instead.
          const items = await Promise.all(Array.from({ length: BULK_LOAD_SIZE }, () => createItem(getRandomDelay())));
          loadingItem.remove();
          items.forEach(item => container.appendChild(item));
          lastItem = container.lastChild;
          observer.observe(lastItem);

          // If we've loaded everything, stop observing and show the "end" message.
          if (container.children.length > MAX_ITEMS) {
            observer.disconnect();
            document.body.classList.add("reached-bottom");
          }
        }
      }

      const observer = new IntersectionObserver(handleIntersection, options);
      observer.observe(lastItem);
    }

    main();
  </script>
