<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-dir gallery</title>
  <style>
    body {
      font-family: system-ui;
      font-size: 1rem;
      display: grid;
      grid-template-rows: 1fr 7rem 1fr;
      max-inline-size: 50rem;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .photos {
      display: grid-lanes;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.25rem;
    }

    .photos.bottom-up {
      grid-lanes-direction: column fill-reverse;
    }

    .photos.top-down {
      grid-lanes-direction: column;
    }

    .photo img {
      inline-size: 100%;
      block-size: auto;
      display: block;
    }

    h1 {
      margin: 0;
      place-self: center;
      font-size: 7rem;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="photos bottom-up">
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-10.JPG" alt="Seattle" width="667" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-2.JPG" alt="Seattle" width="1000" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-3.JPG" alt="Seattle" width="1000" height="667"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-4.JPG" alt="Seattle" width="667" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-5.JPG" alt="Seattle" width="667" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-6.JPG" alt="Seattle" width="1000" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-7.JPG" alt="Seattle" width="1000" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-8.JPG" alt="Seattle" width="1000" height="1000"></div>
  </div>
  <h1>Seattle</h1>
  <div class="photos top-down">
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-1.JPG" alt="Seattle" width="1000" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-9.JPG" alt="Seattle" width="667" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-12.JPG" alt="Seattle" width="1000" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-13.JPG" alt="Seattle" width="1000" height="747"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-14.JPG" alt="Seattle" width="1000" height="667"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-15.JPG" alt="Seattle" width="1000" height="667"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-11.JPG" alt="Seattle" width="667" height="1000"></div>
    <div class="photo"><img src="/slides/CSSDay-2026/seattle/seattle-16.JPG" alt="Seattle" width="1000" height="667"></div>
  </div>
  <script>
    addEventListener("click", () => {
      document.querySelectorAll(".photos").forEach((el) => {
        el.classList.toggle("bottom-up");
        el.classList.toggle("top-down");
      });
    });
  </script>
</body>
</html>
