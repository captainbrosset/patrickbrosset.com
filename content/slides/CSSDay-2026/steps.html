---
layout: slide.njk
title: Fun with grid-lanes - CSSDay 2026 - Steps pattern
notes: |
  500 items is no fun.
  What if we went all the way to 10,000?

  All of these have different sizes and colors
  and the gap between them is animated.

  Creating an abstract steps pattern.
---

<style>
  html,
  body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to bottom, rgb(92, 10, 92), rgb(92, 10, 92));
  }

  .stairs {
    width: 100vw;
    height: 100vh;
    display: grid-lanes;
    grid-template-rows: repeat(auto-fill, auto);
    gap: .5vmin;
    flow-tolerance: infinite;
    overflow: hidden;
    border: 2px solid;

    animation: gapify 10s ease-in infinite alternate;
  }

  @keyframes gapify {
    from {
      gap: .5vmin;
    }

    to {
      gap: 1.5vmin;
    }
  }

  .item {
    --base-size: 2px;
    --min: 1;
    --max: 100;
    block-size: var(--base-size);
    inline-size: calc((var(--max) - abs(mod(sibling-index() - 1, 2 * var(--max)) - var(--max)) + var(--min)) * var(--base-size));
    background-color: hsl(300 80% calc(20% + mod(sibling-index() - 1, var(--max)) * 60% / var(--max)));
  }
</style>

<div class="stairs"></div>
<script>
  const NB = 10000;
  const stairs = document.querySelector(".stairs");
  for (let i = 0; i < NB; i++) {
    const item = document.createElement("div");
    item.className = "item";
    stairs.appendChild(item);
  }
</script>
