<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>animated gap decorations</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      display: grid;
      place-content: center;
      overflow: hidden;
      background: black;
    }

    .grid {
      width: 100vmin;
      aspect-ratio: 10;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: auto;

      column-rule-style: solid;
      column-rule-color: white;
      animation: scan 2s linear infinite;

      animation-delay: calc(sibling-index() * -.5s);
    }

    @keyframes scan {
      0% {
        column-rule-width: 10vmin, 7vmin, 3vmin, 1vmin, 0vmin, 0vmin, 0vmin, 0vmin, 0vmin;
      }

      6% {
        column-rule-width: 7vmin, 10vmin, 7vmin, 3vmin, 1vmin, 0vmin, 0vmin, 0vmin, 0vmin;
      }

      13% {
        column-rule-width: 3vmin, 7vmin, 10vmin, 7vmin, 3vmin, 1vmin, 0vmin, 0vmin, 0vmin;
      }

      19% {
        column-rule-width: 1vmin, 3vmin, 7vmin, 10vmin, 7vmin, 3vmin, 1vmin, 0vmin, 0vmin;
      }

      25% {
        column-rule-width: 0vmin, 1vmin, 3vmin, 7vmin, 10vmin, 7vmin, 3vmin, 1vmin, 0vmin;
      }

      31% {
        column-rule-width: 0vmin, 0vmin, 1vmin, 3vmin, 7vmin, 10vmin, 7vmin, 3vmin, 1vmin;
      }

      38% {
        column-rule-width: 0vmin, 0vmin, 0vmin, 1vmin, 3vmin, 7vmin, 10vmin, 7vmin, 3vmin;
      }

      44% {
        column-rule-width: 0vmin, 0vmin, 0vmin, 0vmin, 1vmin, 3vmin, 7vmin, 10vmin, 7vmin;
      }

      50% {
        column-rule-width: 0vmin, 0vmin, 0vmin, 0vmin, 0vmin, 1vmin, 3vmin, 7vmin, 10vmin;
      }

      56% {
        column-rule-width: 0vmin, 0vmin, 0vmin, 0vmin, 1vmin, 3vmin, 7vmin, 10vmin, 7vmin;
      }

      63% {
        column-rule-width: 0vmin, 0vmin, 0vmin, 1vmin, 3vmin, 7vmin, 10vmin, 7vmin, 3vmin;
      }

      69% {
        column-rule-width: 0vmin, 0vmin, 1vmin, 3vmin, 7vmin, 10vmin, 7vmin, 3vmin, 1vmin;
      }

      75% {
        column-rule-width: 0vmin, 1vmin, 3vmin, 7vmin, 10vmin, 7vmin, 3vmin, 1vmin, 0vmin;
      }

      81% {
        column-rule-width: 1vmin, 3vmin, 7vmin, 10vmin, 7vmin, 3vmin, 1vmin, 0vmin, 0vmin;
      }

      88% {
        column-rule-width: 3vmin, 7vmin, 10vmin, 7vmin, 3vmin, 1vmin, 0vmin, 0vmin, 0vmin;
      }

      94%,
      100% {
        column-rule-width: 7vmin, 10vmin, 7vmin, 3vmin, 1vmin, 0vmin, 0vmin, 0vmin, 0vmin;
      }
    }
  </style>
</head>

<body>
  <div class="grid"></div>
  <div class="grid"></div>
  <div class="grid"></div>
  <div class="grid"></div>
  <div class="grid"></div>
  <div class="grid"></div>
  <div class="grid"></div>
  <div class="grid"></div>
  <div class="grid"></div>
  <div class="grid"></div>
</body>

</html>
