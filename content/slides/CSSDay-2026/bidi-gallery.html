<style>
  body {
    font-family: system-ui;
    display: grid;
    grid-template-rows: 100vh 7.7vw 100vh;
    max-inline-size: 80vw;
    margin: 2rem auto;
    padding: 0 2rem;
    background: black;
  }

  .photos {
    display: grid-lanes;
    grid-template-columns: repeat(4, 1fr);
    gap: 1vmin;
  }

  .photo {
    outline: 1.5vmin solid white;
    outline-offset: -1.5vmin;
  }

  .photos.bottom-up {
    grid-lanes-direction: column fill-reverse;
  }

  .photos.top-down {
    grid-lanes-direction: column;
  }

  .photo img {
    inline-size: 100%;
    block-size: auto;
    display: block;
  }

  h1 {
    margin: 0;
    text-fit: grow;
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: -1vmin;
    text-align: center;
    color: white;
    font-family: arial black;
  }
</style>
